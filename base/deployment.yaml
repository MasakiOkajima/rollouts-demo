apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: rollouts-demo
  name: rollouts-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rollouts-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollouts-demo
    spec:
      containers:
      - image: argoproj/rollouts-demo:blue
        name: rollouts-demo
        ports:
          - name: http
            containerPort: 8080
