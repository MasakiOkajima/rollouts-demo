apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: rollouts-demo
  name: rollouts-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rollouts-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollouts-demo
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - image: argoproj/rollouts-demo:blue
        name: rollouts-demo
        ports:
          - name: http
            containerPort: 8080
        envFrom:
          - configMapRef:
              name: rollouts-demo-config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 64Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 10
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
          failureThreshold: 5
        lifecycle:
          preStop:
            sleep:
              seconds: 10
