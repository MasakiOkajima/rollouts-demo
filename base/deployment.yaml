apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: rollouts-demo
  name: rollouts-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rollouts-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollouts-demo
    spec:
      containers:
      - image: argoproj/rollouts-demo:blue
        name: rollouts-demo
        ports:
          - name: http
            containerPort: 8080
        envFrom:
          - configMapRef:
              name: rollouts-demo-config
        readinessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 10
          failureThreshold: 3
