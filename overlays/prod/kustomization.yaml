apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - namespace.yaml
  - pdb.yaml
namespace: rollouts-demo-prod
replicas:
  - name: rollouts-demo
    count: 3
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rollouts-demo
      spec:
        template:
          spec:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                # AWSとかじゃそもそもコントロールプレーンのノードは対象ではない
                nodeTaintsPolicy: Honor
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rollouts-demo
            containers:
              - name: rollouts-demo
                resources:
                  limits:
                    memory: 128Mi
                  requests:
                    memory: 128Mi
                    cpu: 100m
configMapGenerator:
  - name: rollouts-demo-config
    behavior: merge
    literals:
      - ENV_NAME=prod
